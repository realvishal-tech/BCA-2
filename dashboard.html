<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal | Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <section class="card">
        <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; margin-bottom: 18px;">
          <div>
            <h1 id="welcomeTitle">Hello!</h1>
            <p>Access your saved study materials and open them in a new tab.</p>
          </div>
          <button class="secondary" id="logoutBtn">Logout</button>
        </div>

        <div id="alertContainer"></div>

        <div class="list-card" id="materialsList"></div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    const materialsList = document.getElementById('materialsList');
    const alertContainer = document.getElementById('alertContainer');
    const logoutBtn = document.getElementById('logoutBtn');

    const user = ensureUserLoggedIn();
    if (user) {
      document.getElementById('welcomeTitle').textContent = `Welcome, ${user}!`;
    }

    logoutBtn.addEventListener('click', () => {
      logoutUser();
    });

    function renderMaterials() {
      const materials = getMaterials();
      materialsList.innerHTML = '';

      if (materials.length === 0) {
        materialsList.innerHTML = '<p style="color: var(--muted);">No study materials have been added yet. Ask the admin to add links.</p>';
        return;
      }

      materials.forEach((item) => {
        const materialCard = document.createElement('div');
        materialCard.className = 'material-item';

        materialCard.innerHTML = `
          <div>
            <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>
            <p style="margin: 8px 0 0; color: var(--muted); font-size: 0.95rem;">${item.url}</p>
          </div>
        `;
        materialsList.appendChild(materialCard);
      });
    }

    renderMaterials();
  </script>
</body>
</html>
