<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal | Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>📚 StudyHub</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="#notes" class="nav-item">
          <span class="nav-icon">📝</span>
          <span>Notes</span>
        </a>
        <a href="#links" class="nav-item">
          <span class="nav-icon">🔗</span>
          <span>Links</span>
        </a>
        <a href="#materials" class="nav-item">
          <span class="nav-icon">📖</span>
          <span>Materials</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn-secondary" id="logoutBtn" style="width: 100%; margin-bottom: 0;">
          Logout
        </button>
      </div>
    </aside>

    <!-- Top Navbar -->
    <nav class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <span class="topbar-title">Dashboard</span>
      </div>

      <div class="topbar-right">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <div class="user-name" id="userName">User</div>
            <div class="user-role">Student</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div id="alertContainer"></div>

      <!-- Welcome Section -->
      <div class="welcome-card">
        <div class="welcome-title">Welcome back, <span id="welcomeName">User</span>! 👋</div>
        <div class="welcome-subtitle">
          Explore your study notes, important links, and materials all organized in one place.
        </div>
      </div>

      <!-- Notes Category -->
      <div class="category-section" id="notesSection">
        <div class="category-header">
          <div class="category-icon">📝</div>
          <div class="category-title">Study Notes</div>
          <div class="category-count">
            <span id="notesCount">0</span> notes
          </div>
        </div>
        <div class="category-grid" id="notesList"></div>
      </div>

      <!-- Important Links Category -->
      <div class="category-section" id="linksSection">
        <div class="category-header">
          <div class="category-icon">🔗</div>
          <div class="category-title">Important Links</div>
          <div class="category-count">
            <span id="linksCount">0</span> links
          </div>
        </div>
        <div class="category-grid" id="linksList"></div>
      </div>

      <!-- Study Materials Category -->
      <div class="category-section" id="materialsSection">
        <div class="category-header">
          <div class="category-icon">📖</div>
          <div class="category-title">Study Materials</div>
          <div class="category-count">
            <span id="materialsCount">0</span> materials
          </div>
        </div>
        <div class="category-grid" id="materialsList"></div>
      </div>
    </main>
  </div>

  <!-- Mobile Sidebar Toggle Float Button -->
  <button class="toggle-sidebar" id="toggleSidebarBtn">☰</button>

  <script src="app.js"></script>
  <script>
    const sidebar = document.querySelector('.sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const toggleBtn = document.getElementById('toggleSidebarBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const alertContainer = document.getElementById('alertContainer');

    // Check user login
    const user = ensureUserLoggedIn();
    if (user) {
      document.getElementById('userName').textContent = user;
      document.getElementById('welcomeName').textContent = user;
      document.getElementById('userAvatar').textContent = user.charAt(0).toUpperCase();
    }

    // Menu toggle
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Close sidebar when clicking on a nav item
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        sidebar.classList.remove('active');
      });
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      logoutUser();
    });

    // Render category resources
    function renderCategory(items, containerId, countId, emptyMessage = '') {
      const container = document.getElementById(containerId);
      const countEl = document.getElementById(countId);
      
      countEl.textContent = items.length;
      container.innerHTML = '';

      if (items.length === 0) {
        const category = containerId.replace('List', '');
        const emoji = category === 'notes' ? '📝' : category === 'links' ? '🔗' : '📖';
        container.innerHTML = `
          <div class="category-empty">
            <div class="category-empty-icon">${emoji}</div>
            <p>No items added yet</p>
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">Admin will add resources soon</p>
          </div>
        `;
        return;
      }

      items.forEach((item) => {
        const card = createPreviewCard(item, '', -1);
        card.querySelector('.btn-preview-delete').style.display = 'none';
        container.appendChild(card);
      });

      // Add open link functionality
      container.querySelectorAll('.btn-preview-open').forEach(btn => {
        btn.addEventListener('click', () => {
          window.open(btn.dataset.url, '_blank');
        });
      });
    }

    // Initial render
    function renderAllCategories() {
      const notes = getNotes();
      const links = getImportantLinks();
      const materials = getStudyMaterials();

      renderCategory(notes, 'notesList', 'notesCount');
      renderCategory(links, 'linksList', 'linksCount');
      renderCategory(materials, 'materialsList', 'materialsCount');
    }

    renderAllCategories();

    // Listen for storage changes (real-time update from admin panel)
    window.addEventListener('storage', () => {
      renderAllCategories();
    });
  </script>
</body>
</html>
