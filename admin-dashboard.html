<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal | Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <section class="card">
        <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; margin-bottom: 18px;">
          <div>
            <h1>Admin Panel</h1>
            <p>Manage study materials in localStorage and keep the user dashboard updated.</p>
          </div>
          <button class="secondary" id="logoutBtn">Logout</button>
        </div>

        <div id="alertContainer"></div>

        <form id="materialForm" class="form-group">
          <div class="form-group">
            <label for="title">Material Title</label>
            <input type="text" id="title" name="title" placeholder="Enter link title" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="url">Material URL</label>
            <input type="url" id="url" name="url" placeholder="Enter URL starting with https://" autocomplete="off" />
          </div>
          <button type="submit">Add Material</button>
        </form>

        <div class="list-card" id="materialsList"></div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    const materialsList = document.getElementById('materialsList');
    const materialForm = document.getElementById('materialForm');
    const alertContainer = document.getElementById('alertContainer');
    const logoutBtn = document.getElementById('logoutBtn');

    if (!ensureAdminLoggedIn()) {
      return;
    }

    logoutBtn.addEventListener('click', () => {
      logoutAdmin();
    });

    materialForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();

      if (!title || !url) {
        showAlert(alertContainer, 'Both title and URL are required.', 'error');
        return;
      }

      if (!/^https?:\/\//i.test(url)) {
        showAlert(alertContainer, 'Please enter a valid URL starting with http:// or https://.', 'error');
        return;
      }

      const materials = getMaterials();
      materials.push({ title, url });
      saveMaterials(materials);
      materialForm.reset();
      showAlert(alertContainer, 'Material added successfully.', 'success');
      renderMaterials();
    });

    function handleDelete(index) {
      const materials = getMaterials();
      materials.splice(index, 1);
      saveMaterials(materials);
      showAlert(alertContainer, 'Material removed successfully.', 'success');
      renderMaterials();
    }

    function renderMaterials() {
      const materials = getMaterials();
      materialsList.innerHTML = '';

      if (materials.length === 0) {
        materialsList.innerHTML = '<p style="color: var(--muted);">No materials are available. Add one using the form above.</p>';
        return;
      }

      materials.forEach((item, index) => {
        const materialCard = document.createElement('div');
        materialCard.className = 'material-item';

        materialCard.innerHTML = `
          <div>
            <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>
            <p style="margin: 8px 0 0; color: var(--muted); font-size: 0.95rem;">${item.url}</p>
          </div>
          <div class="controls">
            <button type="button" class="danger" data-index="${index}">Delete</button>
          </div>
        `;

        materialsList.appendChild(materialCard);
      });

      materialsList.querySelectorAll('.danger').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.index);
          handleDelete(index);
        });
      });
    }

    renderMaterials();
  </script>
</body>
</html>
