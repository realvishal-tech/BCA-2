<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BCA Study Hub | Admin Login</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-wrap {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:20px;
      background: linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#3b0764 100%);
      position:relative; overflow:hidden;
    }
    .login-wrap::before {
      content:''; position:absolute; top:-30%; right:-20%; width:500px; height:500px;
      background:radial-gradient(circle,rgba(99,102,241,0.2) 0%,transparent 70%);
      border-radius:50%; pointer-events:none;
    }
    .login-wrap::after {
      content:''; position:absolute; bottom:-20%; left:-15%; width:400px; height:400px;
      background:radial-gradient(circle,rgba(147,51,234,0.2) 0%,transparent 70%);
      border-radius:50%; pointer-events:none;
    }
    .login-card {
      background:rgba(30,41,59,0.85); backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.1); border-radius:24px;
      padding:clamp(28px,6vw,48px) clamp(24px,5vw,40px);
      width:min(420px,100%); position:relative; z-index:1;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      animation: fadeInUp 0.6s ease;
    }
    .login-logo { font-size:2.2rem; margin-bottom:16px; text-align:center; }
    .login-title {
      font-size:1.5rem; font-weight:800; text-align:center; margin-bottom:6px;
      background:linear-gradient(135deg,#818cf8,#c084fc); -webkit-background-clip:text;
      -webkit-text-fill-color:transparent; background-clip:text;
    }
    .login-sub { font-size:0.85rem; color:rgba(255,255,255,0.5); text-align:center; margin-bottom:28px; }
    .login-field { margin-bottom:18px; }
    .login-field label { display:block; font-size:0.8rem; font-weight:600; color:rgba(255,255,255,0.6); margin-bottom:7px; text-transform:uppercase; letter-spacing:0.5px; }
    .login-field input {
      width:100%; padding:12px 16px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
      border-radius:12px; color:#fff; font-size:0.92rem; outline:none;
      transition:all 0.3s; font-family:inherit;
    }
    .login-field input:focus { border-color:rgba(99,102,241,0.7); background:rgba(255,255,255,0.09); box-shadow:0 0 0 3px rgba(99,102,241,0.2); }
    .login-field input::placeholder { color:rgba(255,255,255,0.25); }
    .login-submit {
      width:100%; padding:13px; border:none; border-radius:12px;
      background:linear-gradient(135deg,#4f46e5,#9333ea); color:#fff;
      font-size:0.95rem; font-weight:700; cursor:pointer;
      box-shadow:0 4px 20px rgba(79,70,229,0.5);
      transition:all 0.3s; font-family:inherit; margin-top:8px;
    }
    .login-submit:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(79,70,229,0.6); }
    .login-submit:active { transform:translateY(0); }
    .login-alert { padding:11px 14px; border-radius:10px; font-size:0.83rem; margin-bottom:16px; display:none; }
    .login-alert.show { display:block; }
    .login-alert.error { background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; }
    .login-alert.success { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.35); color:#86efac; }
    .login-footer { margin-top:20px; text-align:center; font-size:0.78rem; color:rgba(255,255,255,0.3); }
    .login-footer a { color:rgba(148,163,184,0.7); text-decoration:underline; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">BCA Study Hub — Administrator Access</div>

    <div class="login-alert" id="loginAlert"></div>

    <form id="adminLoginForm" autocomplete="off">
      <div class="login-field">
        <label for="adminEmail">Email Address</label>
        <input type="email" id="adminEmail" placeholder="Enter admin email" required autocomplete="new-password"/>
      </div>
      <div class="login-field">
        <label for="adminPass">Password</label>
        <input type="password" id="adminPass" placeholder="Enter admin password" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="login-submit" id="loginSubmit">Login to Admin Panel →</button>
    </form>

    <div class="login-footer">
      Student? <a href="index.html">← Back to Study Hub</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
// Check if already logged in
if (isAdminLoggedIn()) { window.location.replace('admin-dashboard.html'); }

const form = document.getElementById('adminLoginForm');
const alert = document.getElementById('loginAlert');
const btn = document.getElementById('loginSubmit');

function showAlert(msg, type) {
  alert.textContent = msg;
  alert.className = 'login-alert show ' + type;
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const email = document.getElementById('adminEmail').value.trim();
  const pass = document.getElementById('adminPass').value;

  if (!email || !pass) { showAlert('⚠️ Please fill in all fields', 'error'); return; }

  btn.textContent = 'Verifying...'; btn.disabled = true;

  setTimeout(() => {
    if (adminLogin(email, pass)) {
      showAlert('✅ Access granted! Redirecting...', 'success');
      setTimeout(() => window.location.replace('admin-dashboard.html'), 900);
    } else {
      showAlert('❌ Invalid credentials. Please try again.', 'error');
      document.getElementById('adminEmail').value = '';
      document.getElementById('adminPass').value = '';
      btn.textContent = 'Login to Admin Panel →'; btn.disabled = false;
    }
  }, 500);
});
</script>
</body>
</html>
