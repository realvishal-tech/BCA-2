<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal | Admin Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1>🔐 Admin Panel</h1>
      <p>Sign in with your credentials to manage study materials</p>

      <div id="alertContainer"></div>

      <form id="adminForm" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter admin email" 
            autocomplete="off"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter admin password" 
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">Login to Admin Panel</button>
      </form>

      <div class="login-footer">
        <p>Student? <a href="index.html">← Student Login</a></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const adminForm = document.getElementById('adminForm');
    const alertContainer = document.getElementById('alertContainer');
    const ADMIN_EMAIL = '10717vishal@gmail.com';
    const ADMIN_PASSWORD = 'Vishal@@2004';

    adminForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        showAlert(alertContainer, '⚠️ Please fill in all fields', 'error');
        return;
      }

      if (email !== ADMIN_EMAIL || password !== ADMIN_PASSWORD) {
        showAlert(alertContainer, '❌ Invalid credentials', 'error');
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        return;
      }

      localStorage.setItem(STORAGE_ADMIN_KEY, 'true');
      showAlert(alertContainer, '✓ Access granted! Redirecting...', 'success');
      
      setTimeout(() => {
        location.href = 'admin-dashboard.html';
      }, 800);
    });
  </script>
</body>
</html>
