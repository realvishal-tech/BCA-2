<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal | Admin Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <section class="card">
        <h1>Admin Access</h1>
        <p>Sign in with your admin credentials to manage study materials.</p>

        <div id="alertContainer"></div>

        <form id="adminForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter admin email" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter admin password" autocomplete="off" />
          </div>
          <button type="submit">Login as Admin</button>
        </form>

        <p style="margin-top: 24px; color: var(--muted);">User login? <a href="index.html">Go to user login</a></p>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    const adminForm = document.getElementById('adminForm');
    const alertContainer = document.getElementById('alertContainer');
    const ADMIN_EMAIL = '10717vishal@gmail.com';
    const ADMIN_PASSWORD = 'Vishal@@2004';

    adminForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        showAlert(alertContainer, 'Please fill in all admin fields.', 'error');
        return;
      }

      if (email !== ADMIN_EMAIL || password !== ADMIN_PASSWORD) {
        showAlert(alertContainer, 'Invalid admin credentials.', 'error');
        return;
      }

      localStorage.setItem(STORAGE_ADMIN_KEY, 'true');
      showAlert(alertContainer, 'Admin login successful! Redirecting...', 'success');
      setTimeout(() => {
        location.href = 'admin-dashboard.html';
      }, 700);
    });
  </script>
</body>
</html>
