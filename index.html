<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal | Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <section class="card">
        <h1>Welcome back!</h1>
        <p>Enter your name to access your study dashboard.</p>

        <div id="alertContainer"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="username">Your Name</label>
            <input type="text" id="username" name="username" placeholder="Type your name" autocomplete="off" />
          </div>
          <button type="submit">Continue</button>
        </form>

        <p style="margin-top: 24px; color: var(--muted);">Admin? <a href="admin.html">Login here</a></p>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const alertContainer = document.getElementById('alertContainer');

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      if (!username) {
        showAlert(alertContainer, 'Please enter your name before continuing.', 'error');
        return;
      }
      localStorage.setItem(STORAGE_USER_KEY, username);
      showAlert(alertContainer, 'Login successful! Redirecting...', 'success');
      setTimeout(() => {
        location.href = 'dashboard.html';
      }, 700);
    });
  </script>
</body>
</html>
