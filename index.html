<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal | Student Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1>📚 Study Portal</h1>
      <p>LND College | BCA 2nd Semester</p>

      <div id="alertContainer"></div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Full Name</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter your full name" 
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">Enter Dashboard</button>
      </form>

      <div class="login-footer">
        <p>Are you an admin? <a href="admin.html">Admin Login →</a></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const alertContainer = document.getElementById('alertContainer');

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      
      if (!username) {
        showAlert(alertContainer, '⚠️ Please enter your name', 'error');
        return;
      }
      
      localStorage.setItem(STORAGE_USER_KEY, username);
      showAlert(alertContainer, '✓ Welcome! Redirecting...', 'success');
      
      setTimeout(() => {
        location.href = 'dashboard.html';
      }, 800);
    });
  </script>
</body>
</html>
